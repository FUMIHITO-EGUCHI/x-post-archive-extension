# GitHub Labels — single source of truth
# Sync: .github/workflows/sync-labels.yml runs node scripts/sync-labels.mjs on main updates.
# Manual: GH_REPO=owner/name node scripts/sync-labels.mjs
#
# Axes: status / owner / priority / type / area

# --- status ---
- name: "status: in-progress"
  color: "2563EB"
  description: "Work is actively in progress"
- name: "status: todo"
  color: "9CA3AF"
  description: "Work has not started"
- name: "status: blocked"
  color: "DC2626"
  description: "Work is blocked by an issue or dependency"
- name: "status: review-pending"
  color: "0E7490"
  description: "PR open, waiting for AI review"
- name: "status: evidence-required"
  color: "9A3412"
  description: "AI submitted evidence, waiting for human acceptance"
- name: "status: accepted"
  color: "15803D"
  description: "Human accepted the evidence, ready to close"
- name: "status: ready-for-close"
  color: "059669"
  description: "Legacy: work complete (use accepted for new issues)"
# --- owner ---
- name: "owner: claude"
  color: "7C3AED"
  description: "Primary owner is Claude"
- name: "owner: codex"
  color: "0F766E"
  description: "Primary owner is Codex"
- name: "owner: human"
  color: "EA580C"
  description: "Primary owner is a human"
# --- priority ---
- name: "priority: high"
  color: "B91C1C"
  description: "High priority"
- name: "priority: medium"
  color: "D97706"
  description: "Medium priority"
- name: "priority: low"
  color: "65A30D"
  description: "Low priority"
# --- type ---
- name: "type: feature"
  color: "1D4ED8"
  description: "New feature work"
- name: "type: bug"
  color: "E11D48"
  description: "Bug fix work"
- name: "type: investigation"
  color: "7C2D12"
  description: "Investigation or research work"
- name: "type: refactor"
  color: "6D28D9"
  description: "Refactor or cleanup work"
# --- model ---
- name: "model: cheap-ok"
  color: "c2e0c6"
  description: "軽量モデルで足りる: 候補抽出・整形・要約"
- name: "model: standard"
  color: "fbca04"
  description: "標準モデル: 既存パターンに沿った実装"
- name: "model: strong-required"
  color: "d93f0b"
  description: "強いモデル必須: 認可/DB/状態管理/曖昧仕様/根本原因調査"
- name: "model: was-overkill"
  color: "5319e7"
  description: "振り返り: strong を使ったが standard で足りた"
# --- cost ---
- name: "cost: overrun"
  color: "5319e7"
  description: "振り返り: 想定より燃えた"
# --- area ---
- name: "area: viewer"
  color: "0EA5E9"
  description: "Viewer UI area"
- name: "area: background"
  color: "6366F1"
  description: "Background or service worker area"
- name: "area: content"
  color: "14B8A6"
  description: "Content script area"
- name: "area: db"
  color: "8B5CF6"
  description: "Database or storage area"
- name: "area: handoff"
  color: "F59E0B"
  description: "AI handoff or coordination area"
- name: "area: other"
  color: "6B7280"
  description: "Other area"
