name: Claude issue triage

on:
  issues:
    types: [opened]

permissions: {}

jobs:
  check-secrets:
    runs-on: ubuntu-latest
    environment: claude  # CLAUDE_CODE_OAUTH_TOKEN は env: claude に格納
    permissions: {}
    outputs:
      has_token: ${{ steps.check.outputs.has_token }}
    steps:
      - id: check
        env:
          T: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
        run: |
          if [ -n "$T" ]; then
            echo "has_token=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_token=false" >> "$GITHUB_OUTPUT"
            echo "::warning::CLAUDE_CODE_OAUTH_TOKEN is not configured for this repository - skipping Claude workflow. Set the secret to enable."
          fi

  triage:
    needs: check-secrets
    if: needs.check-secrets.outputs.has_token == 'true'
    runs-on: ubuntu-latest
    environment: claude  # CLAUDE_CODE_OAUTH_TOKEN は env: claude に格納
    permissions:
      contents: read
      issues: write
      id-token: write
      actions: read  # claude-code-action queries GET /repos/:o/:r/actions/runs to attach job links
    steps:
      - uses: actions/checkout@v4

      - uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            REPO: ${{ github.repository }}
            ISSUE NUMBER: ${{ github.event.issue.number }}
            TITLE: ${{ github.event.issue.title }}
            BODY: ${{ github.event.issue.body }}
            AUTHOR: ${{ github.event.issue.user.login }}

            あなたはこのリポジトリの issue triage 担当。CLAUDE.md / docs/handoff/README.md / docs/handoff/ai-execution.md を参照して、以下を実行する：

            1. `gh label list` で利用可能ラベルを取得
            2. 本文の "強いモデルを要する兆候" チェックボックスと内容から `model: cheap-ok` / `model: standard` / `model: strong-required` を1つ判定して付与
            3. 内容から `type:` と `area:` を1つずつ判定して付与（迷う場合は最も近いもの）
            4. `status: todo` は既存テンプレで付与済みなので触らない
            5. 短い triage コメントを1件残す（判定理由を3行以内）

            **やってはいけないこと**:
            - Issue を close しない
            - `status: ready-for-close` を付けない
            - 本文を編集しない
            - 既に貼られているラベルを削除しない
          claude_args: |
            --allowedTools "Bash(gh label list:*),Bash(gh issue edit:*),Bash(gh issue comment:*),Bash(gh issue view:*)"
