name: security

on:
  push:
    branches: [master]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  gitleaks:
    name: gitleaks (secrets)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7  # v2.3.9
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  trivy:
    name: trivy (vuln + misconfig)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25  # v0.36.0
        with:
          scan-type: fs
          scanners: vuln,misconfig
          severity: HIGH,CRITICAL
          exit-code: "1"
          ignore-unfixed: true
          cache: true

  shellcheck:
    name: shellcheck (shell scripts)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ludeeus/action-shellcheck@00cae500b08a931fb5698e11e79bfbd38e612a38  # 2.0.0
        with:
          severity: warning

  semgrep:
    name: semgrep (shell security policy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
          cache: 'pip'
          cache-dependency-path: .github/workflows/requirements-semgrep.txt
      - run: pip install -r .github/workflows/requirements-semgrep.txt
      - run: |
          semgrep scan \
            --config r/bash \
            --config p/secrets \
            --error \
            --severity=WARNING \
            --severity=ERROR \
            --metrics=off

  semgrep-js:
    name: semgrep (JS/TS security)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
          cache: 'pip'
          cache-dependency-path: .github/workflows/requirements-semgrep.txt
      - run: pip install -r .github/workflows/requirements-semgrep.txt
      # p/javascript: XSS / eval / prototype pollution / unsafe postMessage 等
      # p/react: dangerouslySetInnerHTML / unsafe ref patterns
      # WARNING 以上で fail。ノイズが多い場合は --severity=ERROR のみに絞る
      - run: |
          semgrep scan \
            --config p/javascript \
            --config p/react \
            --error \
            --severity=WARNING \
            --severity=ERROR \
            --metrics=off
