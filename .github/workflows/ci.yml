name: ci

on:
  push:
    branches: [master]
    # ドキュメントのみの変更では CI を回さない。コードと CI 設定は除外しない。
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
      - 'LICENSE'
      - '.github/ISSUE_TEMPLATE/**'
      - '.gitignore'
      - 'samples/**'
      - 'ai-handoff/**'
      - 'tasks/**'
      - 'templates/**'
  pull_request:
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
      - 'LICENSE'
      - '.github/ISSUE_TEMPLATE/**'
      - '.gitignore'
      - 'samples/**'
      - 'ai-handoff/**'
      - 'tasks/**'
      - 'templates/**'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    name: typecheck + lint + build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4.4.0
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: lint (eslint, content-safe boundary)
        run: npm run lint
      - name: typecheck (tsc --noEmit)
        run: npm run typecheck
      - name: build + content-script bundle guard
        # `npm run guard:content-scripts` runs `wxt build` then verifies the
        # built content scripts do not contain Dexie / DexieError / U+FFFF.
        run: npm run guard:content-scripts
